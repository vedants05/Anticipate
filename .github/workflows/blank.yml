name: University Project Automated Pipeline

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

defaults:
  run:
    working-directory: ./anticipate-app

jobs:
  ci-checks:
    name: 🧪 Linter & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: 🏗️ Checkout code
        uses: actions/checkout@v4

      - name: 🏗️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: './anticipate-app/package-lock.json'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🧹 Run Linter
        run: npm run lint
        continue-on-error: true

      - name: 🧪 Run Tests
        run: npm test -- --watchAll=false
        continue-on-error: true

  publish-expo-go:
    name: 🚀 Push to Expo Go (Free & Unlimited)
    needs: ci-checks
    runs-on: ubuntu-latest
    steps:
      - name: 🏗️ Checkout code
        uses: actions/checkout@v4

      - name: 🏗️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: './anticipate-app/package-lock.json'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🚀 Setup Expo
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
          working-directory: ./anticipate-app

      - name: 📱 Publish Update
        run: eas update --auto
        env:
          CI: true

  build-android-apk:
    name: 🤖 Compile & Store Android APK
    needs: ci-checks
    runs-on: ubuntu-latest
    steps:
      - name: 🏗️ Checkout code
        uses: actions/checkout@v4

      - name: 🏗️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: './anticipate-app/package-lock.json'

      - name: 📦 Install dependencies
        run: npm ci

      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: ⚙️ Optimize VM Memory (Prevents Crashes)
        working-directory: /
        run: |
          sudo swapoff -a
          sudo dd if=/dev/zero of=/swapfile bs=1G count=4
          sudo mkswap /swapfile
          sudo swapon /swapfile

      - name: 🚀 Setup Expo
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
          working-directory: ./anticipate-app

      - name: 🔨 Build Android APK Locally
        run: eas build --platform android --profile preview --local --non-interactive --output=./app-release.apk

      - name: 📦 Upload APK to GitHub Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: apk-history-run-${{ github.run_number }}
          path: ./anticipate-app/app-release.apk
          retention-days: 7

  build-ios-simulator:
    name: 🍎 Compile & Store iOS Simulator Build
    needs: ci-checks
    runs-on: macos-15
    steps:
      - name: 🔄 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode_16.4.app

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: './anticipate-app/package-lock.json'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🧹 Clear Xcode SPM cache
        run: |
          rm -rf ~/Library/Developer/Xcode/DerivedData
          rm -rf ~/Library/Caches/org.swift.swiftpm

      - name: 🔧 Setup Expo
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
          working-directory: ./anticipate-app

      - name: 🏗️ Build iOS Simulator Locally
        run: eas build --platform ios --profile simulator --local --non-interactive --output=./app-simulator.tar.gz

      - name: 📋Collect Xcode build log on failure
        if: failure()
        run: |
          mkdir -p /tmp/xcode-logs
          find /var/folders -path "*/eas-build-local-nodejs/*/logs/*.log" 2>/dev/null | while read f; do
            cp "$f" /tmp/xcode-logs/ 2>/dev/null || true
          done

      - name: 📋 Upload Xcode build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: xcode-build-log-${{ github.run_number }}
          path: /tmp/xcode-logs/
          retention-days: 3

      - name: 📤 Upload iOS Build to GitHub Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-simulator-run-${{ github.run_number }}
          path: ./anticipate-app/app-simulator.tar.gz
          retention-days: 7